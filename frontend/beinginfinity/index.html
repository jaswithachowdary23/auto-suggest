<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BeingInfinity - Auto Suggest</title>

<style>
body{margin:0;font:16px Arial,sans-serif}
.top-nav{display:flex;justify-content:space-between;align-items:center;padding:15px 25px}
.settings-link{font-size:24px;text-decoration:none;color:black}
.status-area{display:flex;gap:8px;align-items:center}
.color-being{color:black}
.color-infinity{color:blue}

.search-wrapper{position:relative;display:inline-block;width:480px;max-width:90vw}
.search-container{display:flex;align-items:center;padding:8px 15px;border:1px solid grey;border-radius:24px;box-shadow:0 1px 6px rgba(0,0,0,.25)}
.lens-btn,.search-input{border:0;background:none}
.lens-btn{cursor:pointer;font-size:18px}
.search-input{width:100%;outline:0;font-size:16px}

.dropdown-menu{
display:none;
position:absolute;
top:100%;
left:0;
width:100%;
margin-top:5px;
background:beige;
border:2px solid black;
border-radius:12px;
overflow:hidden;
z-index:10
}

.suggestion-item{
padding:12px 18px;
cursor:pointer;
border-bottom:1px solid black
}

.suggestion-item:last-child{border:0}
.suggestion-item:hover{background:beige}
.status-msg,.error-msg{padding:12px 18px;font-size:13px}
.error-msg{color:crimson}
</style>
</head>

<body>

<header class="top-nav">
<a href="#settings" class="settings-link">&#9881;</a>

<div class="status-area">
<span>&#9679; Online</span>
<span>&#128340; <span id="search-time">0.02</span> ms</span>
</div>
</header>

<main align="center" style="margin-top:40px">

<h1>
<span class="color-being">Being</span><span class="color-infinity">Infinity</span>
</h1>

<p style="color:#666">
<small>One million phrases, four algorithms, prefix based auto suggest</small>
</p>

<form onsubmit="return false">
<div class="search-wrapper">

<div class="search-container">
<button class="lens-btn">&#128269;</button>

<input
id="search-input"
class="search-input"
type="search"
placeholder="Start typing..."
autocomplete="off">

</div>

<div id="dropdown-menu" class="dropdown-menu"></div>

</div>
</form>

</main>

<script src="script.js"></script>

</body>
</html>
